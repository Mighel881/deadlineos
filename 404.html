<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--c1:#07080f;--c2:#0c0e1a;--c3:#111425;--c4:#171b30;--c5:#1e2338;--c6:#262b44;--t1:#eef0ff;--t2:#9da4cc;--t3:#5d6490;--t4:#363c60;--red:#ff1f3d;--amber:#ff8c00;--lime:#a8ff3e;--ice:#00d4ff;--fd:'Bebas Neue',sans-serif;--fl:'Lora',serif;--fm:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--c1);color:var(--t1);font-family:var(--fm);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;overflow:hidden;cursor:crosshair}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.018) 3px,rgba(0,0,0,.018) 4px)}
.grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black,transparent 70%)}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.08}
.b1{width:500px;height:500px;background:var(--red);top:-150px;left:-150px}
.b2{width:400px;height:400px;background:var(--ice);bottom:-100px;right:-100px}
#cur{position:fixed;width:5px;height:5px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--red)}
#cur-ring{position:fixed;width:26px;height:26px;border:1px solid rgba(255,31,61,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s}
.err-code{font-family:var(--fd);font-size:clamp(120px,20vw,220px);line-height:.85;letter-spacing:-8px;color:var(--red);text-shadow:0 0 60px rgba(255,31,61,.25);position:relative;z-index:1}
.err-code::after{content:'404';position:absolute;inset:0;color:transparent;-webkit-text-stroke:1px rgba(255,31,61,.15);letter-spacing:-8px;transform:translate(4px,4px)}
.err-label{font-size:9px;color:var(--red);letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;position:relative;z-index:1}
.err-title{font-family:var(--fd);font-size:clamp(24px,4vw,48px);margin-bottom:12px;position:relative;z-index:1}
.err-sub{font-family:var(--fl);font-style:italic;font-size:16px;color:var(--t2);max-width:400px;margin:0 auto 36px;line-height:1.75;position:relative;z-index:1}
.err-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.btn-r{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--red);color:#fff;font-family:var(--fd);font-size:15px;letter-spacing:2px;border-radius:4px;text-decoration:none;transition:all .2s;box-shadow:0 0 20px rgba(255,31,61,.25)}.btn-r:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,31,61,.4)}
.btn-g{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:transparent;color:var(--t1);font-family:var(--fd);font-size:13px;letter-spacing:2px;border:1px solid var(--c6);border-radius:4px;text-decoration:none;transition:all .2s}.btn-g:hover{border-color:var(--ice);color:var(--ice)}
.err-nav{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--c5);background:rgba(7,8,15,.95);z-index:10}
.nl{font-family:var(--fd);font-size:18px;letter-spacing:2px;color:var(--t1);text-decoration:none}.nl em{color:var(--red);font-style:normal}
.countdown{margin-top:28px;font-size:11px;color:var(--t4);letter-spacing:1px;position:relative;z-index:1}
.countdown span{color:var(--t2)}

/* ── Mobile Nav ── */
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px;margin-left:4px}
.ham span{display:block;width:22px;height:2px;background:var(--t2);border-radius:2px;transition:all .3s}
.ham.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0}
.ham.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;top:58px;left:0;right:0;background:var(--c2,#0c0e1a);
  border-bottom:1px solid var(--c5,#1e2235);z-index:599;padding:12px 0;flex-direction:column}
.mob-menu.open{display:flex}
.mob-menu a{padding:12px 24px;color:var(--t2,#a0a8c0);text-decoration:none;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--c4,#171b30)}
.mob-menu a:last-child{border-bottom:none}
.mob-menu .mob-lang{padding:12px 24px;cursor:pointer;color:var(--cyan,#00e5ff);
  font-size:11px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;
  border-bottom:1px solid var(--c4,#171b30);text-align:left;width:100%}
.lang-btn{display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 10px;
  background:transparent;border:1px solid var(--c6,#252840);border-radius:4px;
  color:var(--t2);font-size:10px;letter-spacing:1px;transition:all .2s}
.lang-btn:hover{border-color:var(--cyan,#00e5ff);color:var(--cyan,#00e5ff)}
@media(max-width:900px){
  .nav-links{display:none!important}
  .nav-btn-g{display:none}
  .ham{display:flex}
  .lang-btn{display:none}
}

</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<div class="grid"></div>
<div class="blob b1"></div><div class="blob b2"></div>
<nav class="err-nav">
  <button onclick="subToggleLang()" style="display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--c6);border-radius:3px;background:transparent;color:var(--t2);font-family:var(--fd);font-size:10px;letter-spacing:1.5px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--ice)';this.style.color='var(--ice)'" onmouseout="this.style.borderColor='var(--c6)';this.style.color='var(--t2)'"><span class="sub-lang-flag">🇩🇪</span> <span class="sub-lang-lbl">DE</span></button>
<a href="deadlineos-landing-v2.html" class="nl" style="margin-right:auto">Deadline<em>OS</em></a>
</nav>
<div class="err-label" data-i18n="err_label">Error aufgetreten</div>
<div class="err-code">404</div>
<h1 class="err-title" data-i18n="err_title">Page not found.</h1>
<p class="err-sub" data-i18n="err_sub">This page does not exist — or was moved. No chaos, just go back.</p>
<div class="err-btns">
  <a href="deadlineos-landing-v2.html" class="btn-r" data-i18n="btn_home">← Back zur Home</a>
  <a href="deadlineos-v3.html" target="_blank" class="btn-g" data-i18n="btn_app">▶ Open App</a>
  <a href="dos-demo.html" class="btn-g" data-i18n="nav_demo">Demo</a>
</div>
<div class="countdown">Nextleitung in <span id="ct">10</span>s</div>
<script>
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function t(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;cur.style.left=mx+'px';cur.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(t)})();
let s=10;const el=document.getElementById('ct');
const iv=setInterval(()=>{s--;document.getElementById('ct').textContent=s;if(s<=0){clearInterval(iv);window.location.href='deadlineos-landing-v2.html';}},1000);

/* ── Hamburger Menu ── */
function _hamToggle(){
  const h=document.getElementById('ham-btn');
  const m=document.getElementById('mob-menu');
  if(h&&m){h.classList.toggle('open');m.classList.toggle('open');}
}
document.addEventListener('click',function(e){
  const h=document.getElementById('ham-btn');
  const m=document.getElementById('mob-menu');
  if(h&&m&&m.classList.contains('open')){
    if(!h.contains(e.target)&&!m.contains(e.target)){h.classList.remove('open');m.classList.remove('open');}
  }
});

</script>
<script>
/* DeadlineOS i18n © 2026 Mighel Wagner */
const _DB={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
let _lang=_DB.get('dos3-lang',null);
if(!_lang){_lang='en';_DB.set('dos3-lang',_lang);}
const _T={de:{"err_label": "Error occurred", "err_title": "Page not found.", "err_sub": "This page does not exist — or was moved. No chaos, just go back.", "btn_home": "← Back to Homepage", "btn_app": "▶ Open App", "btn_demo": "Demo", "countdown_txt": "Nextleitung in", "countdown_suf": "s", "nav_home": "← Home", "nav_app": "App →", "nav_features": "Features", "nav_pricing": "Pricing", "nav_roadmap": "Roadmap", "nav_compare": "Compare", "nav_demo": "Demo", "footer_copy": "© 2026 Mighel Wagner · DeadlineOS · All rights reserved", "footer_col1": "Product", "footer_col2": "Info", "footer_col3": "Contact", "footer_privacy": "Privacy", "footer_faq": "FAQ", "footer_how": "How it works"},en:{"err_label": "Error occurred", "err_title": "Page not found.", "err_sub": "This page does not exist — or was moved. No chaos, just go back.", "btn_home": "← Back to Homepage", "btn_app": "▶ Open App", "btn_demo": "Demo", "countdown_txt": "Redirecting in", "countdown_suf": "s", "nav_home": "← Home", "nav_app": "App →", "nav_features": "Features", "nav_pricing": "Pricing", "nav_roadmap": "Roadmap", "nav_compare": "Compare", "nav_demo": "Demo", "footer_copy": "© 2026 Mighel Wagner · DeadlineOS · All rights reserved", "footer_col1": "Product", "footer_col2": "Info", "footer_col3": "Contact", "footer_privacy": "Privacy", "footer_faq": "FAQ", "footer_how": "How it works"}};
function _t(k){return(_T[_lang]||_T.de)[k]||k;}
function subToggleLang(){_lang=_lang==='xx'?'en':'de';_DB.set('dos3-lang',_lang);_applySubLang();}
function _applySubLang(){
  const L=_T[_lang];
  document.documentElement.lang=_lang;
  document.querySelectorAll('.sub-lang-flag').forEach(el=>el.textContent=_lang==='xx'?'🇩🇪':'🇬🇧');
  document.querySelectorAll('.sub-lang-lbl').forEach(el=>el.textContent=_lang==='xx'?'DE':'EN');
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(L[k]!==undefined)el.textContent=L[k];});
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{const k=el.getAttribute('data-i18n-html');if(L[k]!==undefined)el.innerHTML=L[k];});
  if(typeof _pageTranslate==='function')_pageTranslate(_lang,L);
}
document.addEventListener('DOMContentLoaded',()=>_applySubLang());
</script>
