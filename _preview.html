<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeadlineOS — Preview All Pages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; }
  .logo { padding: 12px 16px 20px; font-size: 13px; font-weight: 700; color: #c8ff00; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; margin-bottom: 12px; }
  .logo span { color: #555; font-weight: 400; display: block; font-size: 10px; letter-spacing: 1px; margin-top: 2px; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border: none; background: none; color: #888; font-size: 12px; text-align: left; width: 100%; transition: all 0.2s; letter-spacing: 0.5px; }
  .nav-btn:hover { background: #1a1a1a; color: #c8ff00; }
  .nav-btn.active { background: #1a1a1a; color: #c8ff00; border-left: 2px solid #c8ff00; }
  .nav-btn .icon { font-size: 16px; width: 20px; }
  .frame-wrap { flex: 1; position: relative; }
  iframe { width: 100%; height: 100%; border: none; }
  .badge { margin: auto 16px 16px; padding: 8px 12px; background: #1a1a1a; border-radius: 6px; font-size: 10px; color: #555; letter-spacing: 0.5px; line-height: 1.6; }
  .badge strong { color: #c8ff00; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">DeadlineOS <span>All Pages Preview</span></div>
  <button class="nav-btn active" onclick="load('index.html', this)"><span class="icon">🏠</span> Landing Page</button>
  <button class="nav-btn" onclick="load('deadlineos-v3.html', this)"><span class="icon">⚡</span> Main App</button>
  <button class="nav-btn" onclick="load('dos-demo.html', this)"><span class="icon">🎯</span> Demo</button>
  <button class="nav-btn" onclick="load('dos-features.html', this)"><span class="icon">✨</span> Features</button>
  <button class="nav-btn" onclick="load('dos-pricing.html', this)"><span class="icon">💰</span> Pricing</button>
  <button class="nav-btn" onclick="load('dos-compare.html', this)"><span class="icon">📊</span> Compare</button>
  <button class="nav-btn" onclick="load('dos-roadmap.html', this)"><span class="icon">🗺️</span> Roadmap</button>
  <button class="nav-btn" onclick="load('privacy.html', this)"><span class="icon">🔒</span> Privacy</button>
  <button class="nav-btn" onclick="load('pitch.html', this)"><span class="icon">🎤</span> Pitch Deck</button>
  <button class="nav-btn" onclick="load('404.html', this)"><span class="icon">❌</span> 404 Page</button>
  <div style="flex:1"></div>
  <div class="badge"><strong>TestSprite Hackathon</strong><br>English Only ✅<br>All fixes applied ✅</div>
</div>
<div class="frame-wrap">
  <iframe id="preview" src="index.html"></iframe>
</div>
<script>
  function load(url, btn) {
    document.getElementById('preview').src = url;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
</html>
